<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandria Bot - AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div id="chat-container">
        <div id="header">🎻 MANDRIA BOT - AYUDANTE VIRTUAL</div>

        <div id="chat-box">
            <div class="msg bot">¡Buenas! ¿Soy Tango Bot, en que te puedo ayudar?</div>
        </div>

        <div id="input-area">
            <button id="mic-btn" onclick="toggleMic()" title="Hablar">🎤</button>

            <input type="text" id="user-input" placeholder="Escribí o hablá, no seas mandria..."
                onkeypress="handleKeyPress(event)">

            <button id="send-btn" onclick="sendMessage(false)">ENVIAR</button>

            <div id="always-audio-container">
                <label for="always-audio">AUDIO</label>
                <input type="checkbox" id="always-audio">
            </div>
        </div>
    </div>

    <script>

        let recognition;
        let isRecording = false;

        function hablar(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const mensaje = new SpeechSynthesisUtterance(texto);
                mensaje.lang = "es-AR";
                mensaje.pitch = 0.9;
                mensaje.rate = 1.0;
                setTimeout(() => { window.speechSynthesis.speak(mensaje); }, 50);
            }
        }

        function toggleMic() {
            if (!recognition) {
                window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = "es-AR";

                // RECUPERADO: Volvemos a permitir que escuche sin cortar solo
                recognition.continuous = true;
                // CLAVE: No mostramos resultados intermedios para evitar el bardo en móviles
                recognition.interimResults = false;

                recognition.onresult = (event) => {
                    let transcripcionFinal = "";
                    // Recorremos todos los resultados acumulados
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            transcripcionFinal += event.results[i][0].transcript;
                        }
                    }

                    const input = document.getElementById('user-input');
                    // Concatenamos lo nuevo a lo que ya estaba, con un espacio
                    if (transcripcionFinal !== "") {
                        const valorActual = input.value.trim();
                        input.value = (valorActual ? valorActual + " " : "") + transcripcionFinal.trim();
                    }
                };

                recognition.onerror = () => stopRecording();
                recognition.onend = () => {
                    if (isRecording) recognition.start(); // Forzamos que siga escuchando si no dimos STOP
                };
            }

            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
                sendMessage(true); // Envía al presionar STOP
            }
        }

        function startRecording() {
            isRecording = true;
            document.getElementById('user-input').value = "";
            recognition.start();
            const micBtn = document.getElementById('mic-btn');
            micBtn.innerText = "🛑";
            micBtn.classList.add('recording');
        }

        function stopRecording() {
            isRecording = false;
            recognition.stop();
            const micBtn = document.getElementById('mic-btn');
            micBtn.innerText = "🎤";
            micBtn.classList.remove('recording');
        }

        async function sendMessage(vieneDeAudio) {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            const alwaysAudio = document.getElementById('always-audio').checked;

            if (!message) return;

            appendMessage('user', message);
            input.value = '';

            try {
                const response = await fetch(`/preguntar?query=${encodeURIComponent(message)}`);
                const data = await response.json();
                appendMessage('bot', data.respuesta);

                if (vieneDeAudio || alwaysAudio) {
                    hablar(data.respuesta);
                }
            } catch (error) {
                appendMessage('bot', "Se me cortó una cuerda, che.");
            }
        }

        function appendMessage(sender, text) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${sender}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                window.speechSynthesis.cancel();
                sendMessage(false);
            }
        }
    </script>
</body>

</html>
