<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandria Bot - AI Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div id="chat-container">
        <div id="header">🎻 MANDRIA BOT // AGENTE TANGUERO</div>

        <div id="chat-box">
            <div class="msg bot">¡Buenas! ¿Qué bardo vamos a armar hoy?</div>
        </div>

        <div id="input-area">
            <button id="mic-btn" onclick="toggleMic()" title="Hablar">🎤</button>
            
            <input type="text" id="user-input" 
                   placeholder="Escribí o hablá, no seas mandria..." 
                   onkeypress="handleKeyPress(event)">
            
            <button id="send-btn" onclick="sendMessage(false)">ENVIAR</button>
            
            <div id="always-audio-container">
                <label for="always-audio">AUDIO</label>
                <input type="checkbox" id="always-audio">
            </div>
        </div>
    </div>

    <script>
        // ... (Tu lógica de JavaScript actual se mantiene igual, ya que funciona de diez)
        // Solo asegúrate de copiarla tal cual la tenías dentro de estos tags.
        
        let recognition;
        let isRecording = false;
        let transcripcionFinal = ""; 

        function hablar(texto) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const mensaje = new SpeechSynthesisUtterance(texto);
                mensaje.lang = "es-AR";
                mensaje.pitch = 0.8;
                mensaje.rate = 1.0;
                setTimeout(() => { window.speechSynthesis.speak(mensaje); }, 50);
            }
        }

        function toggleMic() {
            if (!recognition) {
                window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = "es-AR";
                recognition.continuous = true;
                recognition.interimResults = true;

                recognition.onresult = (event) => {
                    let textoInterino = "";
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            transcripcionFinal += event.results[i][0].transcript + " ";
                        } else {
                            textoInterino += event.results[i][0].transcript;
                        }
                    }
                    document.getElementById('user-input').value = (transcripcionFinal + textoInterino).trim();
                };
                recognition.onerror = () => stopRecording();
            }

            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
                sendMessage(true);
            }
        }

        function startRecording() {
            isRecording = true;
            transcripcionFinal = "";
            document.getElementById('user-input').value = "";
            recognition.start();
            document.getElementById('mic-btn').innerText = "🛑";
            document.getElementById('mic-btn').classList.add('recording');
        }

        function stopRecording() {
            isRecording = false;
            recognition.stop();
            document.getElementById('mic-btn').innerText = "🎤";
            document.getElementById('mic-btn').classList.remove('recording');
        }

        async function sendMessage(vieneDeAudio) {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            const alwaysAudio = document.getElementById('always-audio').checked;

            if (!message) return;

            appendMessage('user', message);
            input.value = '';
            transcripcionFinal = "";

            try {
                const response = await fetch(`/preguntar?query=${encodeURIComponent(message)}`);
                const data = await response.json();
                appendMessage('bot', data.respuesta);
                if (vieneDeAudio || alwaysAudio) {
                    hablar(data.respuesta);
                }
            } catch (error) {
                const errorMsg = "Se me cortó una cuerda, che.";
                appendMessage('bot', errorMsg);
                if (vieneDeAudio || alwaysAudio) hablar(errorMsg);
            }
        }

        function appendMessage(sender, text) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${sender}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                window.speechSynthesis.cancel();
                sendMessage(false);
            }
        }
    </script>
</body>
</html>
